<!DOCTYPE html>
<html>
<head>
    <link href="https://unpkg.com/tabulator-tables@6.4.0/dist/css/tabulator.min.css" rel="stylesheet">
    <link href="https://unpkg.com/tabulator-tables@6.4.0/dist/css/tabulator_materialize.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@6.4.0/dist/js/tabulator.min.js"></script>
</head>
<body>
    <div id="test-table"></div>
    <script>
        var table = new Tabulator("#test-table", {
            data: [],
            pagination: true,
            paginationSize: 5,
            paginationSizeSelector: [10, 20],
            columns: [
                {title: "Name", field: "name"}
            ]
        });
        setTimeout(() => {
            let data = [];
            for(let i=0; i<30; i++) data.push({id: i, name: "Name " + i});
            table.replaceData(data);
            console.log("Data replaced. Rows:", table.getData().length);
        }, 1000);
    </script>
</body>
</html>
